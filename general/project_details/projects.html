<body>

<style>
      html, body {
        padding: 0;
        margin: 0;
        font-family: "Poppins", Arial, sans-serif;
        max-width: 100vw;
        min-height: 100%;
        scroll-behavior: smooth;
        /* overflow-x: hidden; */
      }

      #project-card{
        padding-top: 20px;
        padding-left: 20px;
        display: flex;
        align-items: stretch;
      }

      .project-info{
        margin-left: clamp(20px, 5vw, 30px);
        display: flex;
        flex-direction: column;

        &:hover{
            cursor: default;
        }
      }

      .project-title{
        font-size: 40px;
        margin: 0;
      }

      .project-description{
        margin: 0;
        font-size: 1.2rem;
        font-weight: 300;
        line-height: 1.6;
        margin-top: 5px;
        margin-left: 15px;
      }

      .skills{
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 5px;
      }

      .skills i{
        font-size: 2rem;
      }

      .btn{
        border-radius: 5px;
        border: none;
        box-shadow: none;
        background-color: #ffe3b2;
        padding: 0.4rem 1rem;
        display: flex;
        justify-self: center;
        color: black;
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 500;
        margin-top: auto;
        align-self: center;
        text-decoration: none;

        &:hover{
            background-color: #ffd18a;
            cursor: pointer;
        }
      }

      #photo{
        width: 712px;
        height: auto;
        aspect-ratio: 16/9;
        border-radius: 10px;
        object-fit: cover;
      }

      @media (max-width: 900px) {
        #project-card{
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .project-info{
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
      }

    #language-three{
        display: flex;
        width: 100%;
        justify-content: center;
        position: relative;
        margin-top: 50px;
    }

    #language-three .language{
        cursor: default;
        margin-left: 10px;
        position: relative;
        padding: 8px 18px;
        padding-left: 6px;
        padding-top: 0;
        letter-spacing: 600;
        display: flex;
        height: fit-content;
        align-items: center;
        gap: 5px;
        font-weight: 550;
    }


    #language-three .language::before{
        content: "";
        display: block;

        width: 10px;
        height: 5px;
        border-radius: 14px;

        background-color: gray;
    }

    #language-three::before{
        content: "";
        width: 24px;
        height: 200px;
        background: linear-gradient(315deg, #ffd48e, #ffb347);
        border-radius: 18px;
        position: relative;
        top: -10px;
    }
</style>
<script>
function getQueryParams() {
    const params = {};
    const searchParams = new URLSearchParams(window.location.search);
    for (const [key, value] of searchParams.entries()) {
        params[key] = value;
    }
    return params;
}

const projects = {

        skills: ["Html", "Css", "Javascript", "Python", "Electron", "Flask"],
        button_link: "https://github.com/AndreSmalheer/Ai-Vtuber",
        icons: [
            '<i class="fab fa-html5" style="color:#e34c26;"></i>',
            '<i class="fab fa-css3-alt" style="color:#264de4;"></i>',
            '<i class="fab fa-js-square" style="color:#f7df1e;"></i>',
            '<i class="devicon-python-plain" style="color:#306998;"></i>',
            '<i class="devicon-electron-original colored"></i>',
            '<i class="devicon-flask-original"></i>'
        ]
    },

    2: {
        title: "CookUp",
        description: "Een recepten website gemaakt door gen Z",
        image: "https://102464.stu.sd-lab.nl/Portfolio/images/projects/CookUp.png",
        skills: ["Html", "Css", "Javascript", "PHP"],
        button_link: "https://github.com/AdamSaber-mr/Recipe_Website",

    3: {

        image: "https://102464.stu.sd-lab.nl/Portfolio/images/projects/Crowdfunding.png",
        skills: ["html", "css", "javascript", "PHP"],
        button_link: "https://github.com/102464-AS/Crowdfunding-Beroeps",

    4: {

            '<i class="fab fa-html5" style="color:#e34c26;"></i>',
            '<i class="fab fa-css3-alt" style="color:#264de4;"></i>',
            '<i class="fab fa-js-square" style="color:#f7df1e;"></i>',
            '<i class="devicon-python-plain" style="color:#306998;"></i>'
        ]
    }
};

function loadProjectFromQuery() {
    const params = getQueryParams();
    const projectId = params.project_id;

    if (!projectId || !projects[projectId]) return;

    const project = projects[projectId];

    console.log(project)

    document.querySelectorAll(".project-title")[0].textContent = project.title;
    document.querySelectorAll(".project-description")[0].textContent = project.description;
    document.getElementById("photo").src = project.image

    document.querySelectorAll(".btn")[0].href = project.button_link

    const langContainer = document.querySelectorAll(".languages-conater")[0];
    langContainer.innerHTML = "";

    const langIconContainer = document.querySelectorAll(".skills")[0]
    langIconContainer.innerHTML = ""

    project.skills.forEach(lang => {
        const span = document.createElement("span");
        span.className = "language";
        span.textContent = lang;
        langContainer.appendChild(span);
    });

    project.icons.forEach(icon => {
        langIconContainer.innerHTML += icon;
    });

}

window.addEventListener("DOMContentLoaded", loadProjectFromQuery);
</script>
<script type="module" src="https://102464.stu.sd-lab.nl/Portfolio/htmlImporter.js"></script>
