<div
  class="threejs-container"
  id="about-me-three-js"
  data-aos="fade-right"
  data-aos-duration="1000"
></div>
<!-- <img
  src="images/about_me_photo.png"
  data-aos="fade-right"
  data-aos-duration="1000"
/> -->

<div
  id="text_container"
  data-aos="fade-left"
  data-aos-duration="1000"
  data-aos-delay="200"
>
  <h1>Over Mij</h1>
  <p>
    Hoi, ik ben André Smalheer, een software development student bij het
    Grafisch Lyceum niveau 4.
  </p>
</div>

<style>
  #about-me-three-js {
    width: clamp(300px, 50vw, 500px) !important;
    height: clamp(300px, 50vw, 500px) !important;
  }

  #about_me_container {
    width: 100%;
    height: fit-content;
    display: flex;
    justify-content: center;
    margin-left: -5vw;
    /* padding-left: clamp(0.5rem, 4vw, 5rem); */
    /* padding-top: 7rem; */

    & img {
      width: clamp(200px, 40vw, 470px);
      height: clamp(200px, 40vw, 520px);
    }

    & #text_container {
      padding-left: 25px;

      & h1,
      & p {
        margin: 0;
        padding: 0;
        line-height: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      & h1 {
        font-size: clamp(1.5rem, 4vw, 3rem);
        font-weight: bold;
      }

      & p {
        font-size: clamp(1.5rem, 4vw, 1.5rem);
        padding-left: 10px;
        max-width: 600px;
        color: #4a4a4a;
      }

      & h1:hover,
      & p:hover {
        opacity: 0.85;
        transform: translateY(-3px);
        cursor: default;
      }
    }
  }

  @media (max-width: 550px) {
    #about_me_container {
      flex-direction: column;
      align-items: center;
      padding-left: 0;
      padding-top: 4rem;

      & img {
        width: calc(100vw - 20px);
        height: auto;
      }

      & #text_container {
        padding-left: 0;
        margin-top: 20px;
        text-align: center;

        & p {
          max-width: 90vw;
        }
      }
    }
  }
</style>

<script type="module">
  import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

  const scene = new THREE.Scene();
  // scene.background = new THREE.Color(0x1e1e1e);

  const camera = new THREE.PerspectiveCamera(
    35,
    (window.innerWidth * 0.65) / window.innerHeight,
    0.1,
    1000,
  );
  camera.position.z = 3;

  const container = document.getElementById("about-me-three-js");

  const width = container.clientWidth;
  const height = container.clientHeight;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(width, height);
  container.appendChild(renderer.domElement);

  // Cube
  const geometry = new THREE.BoxGeometry();
  const material = new THREE.MeshStandardMaterial({
    color: 0xff7e5f,
    roughness: 0.4,
    metalness: 0.7,
  });
  const cube = new THREE.Mesh(geometry, material);
  scene.add(cube);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
  directionalLight.position.set(5, 5, 5);
  scene.add(directionalLight);

  // Animate cube
  function animate() {
    requestAnimationFrame(animate);
    cube.rotation.x += 0.01;
    cube.rotation.y += 0.01;
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener("resize", () => {
    const width = container.clientWidth;
    const height = container.clientHeight;

    renderer.setSize(width, height);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
  });

  renderer.setSize(width, height);
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
</script>
