<script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/": "https://unpkg.com/three@0.160.0/examples/"
      }
    }
</script>

<script type="module">
  import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
  import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

  const scene = new THREE.Scene();
//   scene.background = new THREE.Color(0x1e1e1e);

  const camera = new THREE.PerspectiveCamera(
    35,
    (window.innerWidth * 0.65) / window.innerHeight,
    0.1,
    1000,
  );
  camera.position.z = 3;

  const container = document.getElementById("hero-three-js");

  const width = container.clientWidth;
  const height = container.clientHeight;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(width, height);
  container.appendChild(renderer.domElement);

  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  {
      const w = 64, h = 32;
      const data = new Uint8Array(w * h * 4);
      for (let y = 0; y < h; y++) {
        const t = y / (h - 1);
        const r = Math.round(THREE.MathUtils.lerp(180, 240, t));
        const g = Math.round(THREE.MathUtils.lerp(210, 240, t));
        const b = Math.round(THREE.MathUtils.lerp(255, 240, t));
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          data[i] = r; data[i+1] = g; data[i+2] = b; data[i+3] = 255;
        }
      }
      const envTex = new THREE.DataTexture(data, w, h);
      envTex.mapping    = THREE.EquirectangularReflectionMapping;
      envTex.colorSpace = THREE.SRGBColorSpace;
      envTex.needsUpdate = true;
      const pmrem = new THREE.PMREMGenerator(renderer);
      pmrem.compileEquirectangularShader();
      scene.environment = pmrem.fromEquirectangular(envTex).texture;
      pmrem.dispose();
      envTex.dispose();
    }


  // 3d model
  const loader = new GLTFLoader();

  loader.load(
    "./model.glb",
    (gltf) => {
      const model = gltf.scene;
      model.scale.set(1, 1, 1);
      model.position.set(0, -0.9, 0);
      scene.add(model);
    },
    undefined,
    (err) => {
      console.error("Error loading model:", err);
    }
  );

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
  directionalLight.position.set(5, 5, 5);
  scene.add(directionalLight);

  function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener("resize", () => {
    const width = container.clientWidth;
    const height = container.clientHeight;

    renderer.setSize(width, height);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
  });

  function resizeRendererToContainer() {
    const width = container.clientWidth;
    const height = container.clientHeight;

    renderer.setSize(width, height);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();

  }

  resizeRendererToContainer();
</script>
