  <h1>André – Creative Software Developer</h1>
  <h2>Turning ideas into smooth, usable products</h2>

<div class="threejs-container" id="hero-three-js" data-aos="zoom-in"></div>

<!-- <img src="images/main_container_photo.png" data-aos="zoom-in" /> -->

<script type="module">
  import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

  const scene = new THREE.Scene();
  // scene.background = new THREE.Color(0x1e1e1e);

  const camera = new THREE.PerspectiveCamera(
    35,
    (window.innerWidth * 0.65) / window.innerHeight,
    0.1,
    1000,
  );
  camera.position.z = 3;

  const container = document.getElementById("hero-three-js");

  const width = container.clientWidth;
  const height = container.clientHeight;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(width, height);
  container.appendChild(renderer.domElement);

  // Cube
  const geometry = new THREE.BoxGeometry();
  const material = new THREE.MeshStandardMaterial({
    color: 0xff7e5f,
    roughness: 0.4,
    metalness: 0.7,
  });
  const cube = new THREE.Mesh(geometry, material);
  scene.add(cube);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
  directionalLight.position.set(5, 5, 5);
  scene.add(directionalLight);

  // Animate cube
  function animate() {
    requestAnimationFrame(animate);
    cube.rotation.x += 0.01;
    cube.rotation.y += 0.01;
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener("resize", () => {
    const width = container.clientWidth;
    const height = container.clientHeight;

    renderer.setSize(width, height);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
  });
</script>
