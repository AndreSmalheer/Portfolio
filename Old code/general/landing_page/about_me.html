<script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/": "https://unpkg.com/three@0.160.0/examples/"

</script>

<style>
  #about-me-three-js {
    width: clamp(300px, 40vw, 400px) !important;
    height: clamp(300px, 40vw, 400px) !important;
  }

  #about_me_container {
    width: 100%;
    height: fit-content;
    display: flex;
    justify-content: center;
    margin-left: -5vw;
    /* padding-left: clamp(0.5rem, 4vw, 5rem); */
    /* padding-top: 7rem; */

    & img {
      width: clamp(200px, 40vw, 470px);
      height: clamp(200px, 40vw, 520px);
    }

    & #text_container {
      padding-left: 25px;

      & h1,
      & p {
        margin: 0;
        padding: 0;
        line-height: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      & h1 {
        font-size: clamp(1.5rem, 4vw, 3rem);
        font-weight: bold;
      }

      & p {
        font-size: clamp(1.5rem, 4vw, 1.5rem);
        padding-left: 10px;
        max-width: 600px;
        color: #4a4a4a;
      }

      & h1:hover,
      & p:hover {
        opacity: 0.85;
        transform: translateY(-3px);
        cursor: default;
      }
    }
  }

  @media (max-width: 550px) {
    #about_me_container {
      flex-direction: column;
      align-items: center;
      padding-left: 0;
      padding-top: 4rem;

      & img {
        width: calc(100vw - 20px);
        height: auto;
      }

      & #text_container {
        padding-left: 0;
        margin-top: 20px;
        text-align: center;

        & p {
          max-width: 90vw;
        }
      }
    }
  }
</style>

<script type="module">
  import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
  import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

  const scene = new THREE.Scene();
//   scene.background = new THREE.Color(0x1e1e1e);

  const camera = new THREE.PerspectiveCamera(
    35,
    (window.innerWidth * 0.65) / window.innerHeight,
    0.1,
    1000,
  );
  camera.position.z = 3;

  const container = document.getElementById("about-me-three-js");

  const width = container.clientWidth;
  const height = container.clientHeight;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(width, height);
  container.appendChild(renderer.domElement);

    {
      const w = 64, h = 32;
      const data = new Uint8Array(w * h * 4);
      for (let y = 0; y < h; y++) {
        const t = y / (h - 1);
        const r = Math.round(THREE.MathUtils.lerp(180, 240, t));
        const g = Math.round(THREE.MathUtils.lerp(210, 240, t));
        const b = Math.round(THREE.MathUtils.lerp(255, 240, t));
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          data[i] = r; data[i+1] = g; data[i+2] = b; data[i+3] = 255;
        }
      }
      const envTex = new THREE.DataTexture(data, w, h);
      envTex.mapping    = THREE.EquirectangularReflectionMapping;
      envTex.colorSpace = THREE.SRGBColorSpace;
      envTex.needsUpdate = true;
      const pmrem = new THREE.PMREMGenerator(renderer);
      pmrem.compileEquirectangularShader();
      scene.environment = pmrem.fromEquirectangular(envTex).texture;
      pmrem.dispose();
      envTex.dispose();
    }


  // 3d model
  const loader = new GLTFLoader();
  let mixer;
  const clock = new THREE.Clock();

//   Desk
  loader.load(
    "./computer_desk.glb",
    (gltf) => {
      const desk = gltf.scene;
      desk.scale.set(0.25, 0.20, 0.25)
      desk.position.set(-0.4, -0.1, 0)
    //   desk.rotation.set(0,Math.PI * 1.3,0)
      desk.rotation.set(0, Math.PI * 1.3 + Math.PI, 0);
      scene.add(desk);
    },
    undefined,
    (err) => {
      console.error("Error loading model:", err);
    }
  );

//   Chair
//   loader.load(
//     "./office_chair.glb",
//     (gltf) => {
//       const chair = gltf.scene;
//       chair.scale.set(0.008, 0.008, 0.008)
//       chair.position.set(0.28,-0.9,0.45)
//       chair.rotation.set(0,Math.PI * 1.3,0)
//       scene.add(chair);
//     },
//     undefined,
//     (err) => {
//       console.error("Error loading model:", err);
//     }
// );

  loader.load(
    "./stool.glb",
    (gltf) => {
      const chair = gltf.scene;
      chair.scale.set(1,0.8,1)
      chair.position.set(0.22,-0.785,0.4)
      scene.add(chair);
    },
    undefined,
    (err) => {
      console.error("Error loading model:", err);
    }
);

// Monitor
loader.load(
    "./monitor.glb",
    (gltf) => {
      const monitor= gltf.scene;
      monitor.scale.set(0.02,0.02,0.02)
      monitor.position.set(-0.5,-0.1,-0.5)
      monitor.rotation.set(0, Math.PI * 1.3 + Math.PI, 0);
      scene.add(monitor);
    },
    undefined,
    (err) => {
      console.error("Error loading model:", err);
    }
);

// 3d model
  loader.load(
    "./typing.glb",
    (gltf) => {
      const model = gltf.scene;
      model.scale.set(1, 1, 1);
      model.position.set(0.25, -0.8, 0.4);
      model.rotation.set(0, Math.PI * 1.3, 0);
      scene.add(model);

      mixer = new THREE.AnimationMixer(model);
      const action = mixer.clipAction(gltf.animations[0]);
      action.play();

    },
    undefined,
    (err) => {
      console.error("Error loading model:", err);
    }
  );

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
  directionalLight.position.set(5, 5, 5);
  scene.add(directionalLight);

  // Animate cube
  function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    if (mixer) mixer.update(delta);

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener("resize", () => {
    const width = container.clientWidth;
    const height = container.clientHeight;

    renderer.setSize(width, height);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
  });

  renderer.setSize(width, height);
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
</script>
